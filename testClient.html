<!DOCTYPE html>
<html>

<head>

    <title>Socket Test</title>

</head>

<body>

<h1>Socket Connected</h1>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

<script>

const socket = io("http://localhost:5000");

socket.on("connect", ()=>{

    console.log("Connected");

});

socket.on("deviceUpdate",(data)=>{

    console.clear();

    console.log(data);

});

</script>

</body>

</html>
